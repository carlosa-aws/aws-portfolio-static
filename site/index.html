
<!DOCTYPE html>
<html>
<head>
  <title>My Cloud Portfolio</title>
</head>
<body>
  <h1>Hello from Terraform + AWS :D </h1>

  <h2>Visitor Count:</h2>
  <p id="visitor-count">Loading...</p>

  <script>
    fetch("https://dsplh4d9a4.execute-api.us-east-1.amazonaws.com/visitor")
      .then(response => response.json())
      .then(data => {
        document.getElementById("visitor-count").innerText = data.visit_count;
      })
      .catch(error => {
        console.error("Error fetching visitor count:", error);
      });
  </script>

</body>
</html>
